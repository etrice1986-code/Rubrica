<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>


    <header class="container">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center my-5"> Rubrica</h1>
            </div>
        </div>
    </header>



           <div class="container">

               <div class="row justify-content-center text-center">
                       
                       <div class="col-12 col-md-6 my-5">
                           <input type="name" placeholder="nome" id="nameInput" class="w-100">
                        </div>
                        
                        <div class="col-12 col-md-6 my-5">
                          <input type="number" placeholder="numero" id="numberInput" class="w-100">
                        </div>
             </div>
             </div>
            
            <div class="col-12  text-center my-5">
                
                <button id="btnShow" class="btn btn-secondary">Mostra contatto</button>
                
                <button id="btnAdd" class="btn btn-info">Aggiungi contatto</button>
                <button id="btnEdit" class="btn btn-success ">Modifica contatto</button>
                <button id="btnRemove" class="btn btn-warning ">Rimuovi contatto</button>
            </div>
            
        </div>
    </div> 

    <!-- container contact -->
     <div class="col-12 containerContacts text-center">
        
     </div>
             
        
     

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script src="./main.js"></script>

  </body>
</html>
