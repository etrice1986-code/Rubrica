<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rubrica di Boris</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="style.css">
  </head>
  <body>




    <header class="container">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center">Rubrica di Boris</h1>
            </div>
        </div>
    </header>

    <!-- button -->
    <section class="container-fluid my-5">
        <div class="row">
            <article class="col-12 col-md-4">
               <h3 class="text-center mb-3">Mostra i contatti in rubrica</h3>
               <button id="showContactsBtn" class="btn btn-cumtom">mostra contatti</button>

            </article>

            <article class="col-12 col-md-4">
                <div class="row">

                    <div class="col-12">
                       <h3 class="text-center mb-3">Aggiungi nuovo contatto</h3>

                    </div>

                    <div class="col-6">

                        
               <div class="input-group mb-3">
                 <input type="text" class="form-control" placeholder="Username" aria-label="Username"            aria-describedby="basic-addon1">
             </div>
                     
               <div class="input-group mb-3">
                 <input type="number" class="form-control" placeholder="Phone Number" aria-label="Phone Number"            aria-describedby="basic-addon1">
             </div>

             </div>

             <div class="col-6">
                <button id="addContactBtn" class="btn btn-cumtom">Aggiungi contatto</button>
             </div>

            </div>
      </article>


            <article class="col-12 col-md-4">
               cerca contatto
            </article>

        </div>
    </section>

    <!-- cards -->
     <section class="container">
        <div class="row justify-content-center">


            <article id="contactsWrapper" class="col-12 col-md-8">
                <!-- <div class="card-custom">
                    <p class="lead">Nome</p>
                    <p>3333333333</p>
                    <i class="fa-solid fa-trash-can icon"></i>

                </div> -->

            </article>

        </div>
     </section>







    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <!-- font awesome -->
    <script src="https://kit.fontawesome.com/f5c8da6a8f.js" crossorigin="anonymous"></script>

    <script src="./main.js"></script>
  </body>
</html>
